<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>存档 · ARCHIVE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --teal: #2A7B6B;
    --teal-light: #3DA08E;
    --purple: #6B4C8A;
    --purple-deep: #4A3468;
    --orange: #E8834A;
    --orange-warm: #F0A06A;
    --green-deep: #1A4A3A;
    --cream: #F5EDE0;
    --glass-bg: rgba(20, 30, 28, 0.65);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-highlight: rgba(255, 255, 255, 0.12);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Inter', 'Noto Serif SC', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    position: relative;
    background: #0a0f0e;
  }

  /* ====== Background: tiled image + overlay ====== */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image: url('https://www.coze.cn/s/JUUZ679mNJw/');
    background-size: cover;
    background-repeat: repeat;
    background-position: center;
    filter: saturate(0.7) brightness(0.5);
    transform: scale(1.05);
    transition: transform 30s ease;
  }
  .bg-layer.playing {
    transform: scale(1.12);
  }

  .bg-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: 
      radial-gradient(ellipse at 30% 20%, rgba(42, 123, 107, 0.25) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(107, 76, 138, 0.2) 0%, transparent 60%),
      linear-gradient(180deg, rgba(10, 15, 14, 0.3) 0%, rgba(10, 15, 14, 0.6) 50%, rgba(10, 15, 14, 0.85) 100%);
  }

  /* ====== Noise texture ====== */
  .noise {
    position: fixed;
    inset: 0;
    z-index: 2;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    pointer-events: none;
  }

  /* ====== Floating particles ====== */
  .particles {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    animation: float-up linear infinite;
  }
  @keyframes float-up {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* ====== Main content ====== */
  .main-container {
    position: relative;
    z-index: 10;
    height: 100%;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    padding: 0;
  }

  /* ====== Album header ====== */
  .album-header {
    flex-shrink: 0;
    padding: 48px 28px 20px;
    text-align: center;
  }

  .album-badge {
    display: inline-block;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--orange);
    border: 1px solid rgba(232, 131, 74, 0.3);
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 18px;
    backdrop-filter: blur(10px);
    background: rgba(232, 131, 74, 0.08);
  }

  .album-title-zh {
    font-family: 'Noto Serif SC', serif;
    font-size: 52px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 12px;
    margin-right: -12px;
    line-height: 1.2;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    position: relative;
    display: inline-block;
  }
  .album-title-zh::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 10%;
    width: 80%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--teal-light), var(--orange), transparent);
    opacity: 0.6;
  }

  .album-title-en {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 8px;
    color: rgba(255, 255, 255, 0.45);
    margin-top: 10px;
    text-transform: uppercase;
  }

  .album-meta {
    margin-top: 16px;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.35);
    font-weight: 300;
    letter-spacing: 1px;
  }
  .album-meta span {
    margin: 0 6px;
    opacity: 0.4;
  }

  /* ====== Tracklist ====== */
  .tracklist-container {
    flex: 1;
    overflow-y: auto;
    padding: 8px 20px 180px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tracklist-container::-webkit-scrollbar { display: none; }

  .track-item {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    margin-bottom: 4px;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
    background: transparent;
    border: 1px solid transparent;
    position: relative;
  }
  .track-item:hover {
    background: var(--glass-bg);
    border-color: var(--glass-border);
  }
  .track-item.active {
    background: var(--glass-bg);
    border-color: var(--glass-highlight);
    backdrop-filter: blur(20px);
  }
  .track-item.active .track-num {
    color: var(--teal-light);
  }
  .track-item.active .track-title {
    color: #fff;
  }

  .track-num {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.25);
    width: 28px;
    flex-shrink: 0;
    text-align: center;
  }

  .track-info {
    flex: 1;
    min-width: 0;
  }

  .track-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.8);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.3s;
  }

  .track-subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.3);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }

  .track-duration {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.2);
    margin-left: 12px;
    flex-shrink: 0;
  }

  /* Playing indicator */
  .track-playing-icon {
    display: none;
    margin-left: 12px;
    flex-shrink: 0;
    gap: 2px;
    align-items: flex-end;
    height: 14px;
  }
  .track-item.active .track-playing-icon { display: flex; }
  .track-item.active .track-duration { display: none; }

  .bar {
    width: 3px;
    background: var(--teal-light);
    border-radius: 2px;
    animation: bar-bounce 0.8s ease-in-out infinite alternate;
  }
  .bar:nth-child(1) { height: 6px; animation-delay: 0s; }
  .bar:nth-child(2) { height: 10px; animation-delay: 0.2s; }
  .bar:nth-child(3) { height: 4px; animation-delay: 0.4s; }
  .bar:nth-child(4) { height: 8px; animation-delay: 0.1s; }

  @keyframes bar-bounce {
    0% { transform: scaleY(0.4); }
    100% { transform: scaleY(1); }
  }
  .paused .bar { animation-play-state: paused; }

  /* ====== Player bar ====== */
  .player-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(12, 18, 16, 0.85);
    backdrop-filter: blur(30px) saturate(1.2);
    border-top: 1px solid var(--glass-border);
    padding: 14px 20px 28px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* Progress bar */
  .progress-container {
    width: 100%;
    height: 3px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 2px;
    cursor: pointer;
    margin-bottom: 14px;
    position: relative;
  }
  .progress-container:hover { height: 5px; margin-bottom: 12px; }
  .progress-container:hover .progress-thumb { opacity: 1; transform: scale(1); }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--teal-light));
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
    position: relative;
  }

  .progress-thumb {
    position: absolute;
    right: -6px;
    top: 50%;
    transform: scale(0);
    width: 12px;
    height: 12px;
    background: var(--teal-light);
    border-radius: 50%;
    margin-top: -6px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 0 8px rgba(61, 160, 142, 0.5);
  }

  .player-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .player-track-info {
    flex: 1;
    min-width: 0;
  }

  .player-track-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .player-track-time {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.35);
    margin-top: 2px;
  }

  .player-controls {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-left: 20px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .ctrl-btn:hover { transform: scale(1.1); }
  .ctrl-btn:active { transform: scale(0.95); }

  .ctrl-btn svg {
    fill: rgba(255, 255, 255, 0.7);
    transition: fill 0.2s;
  }
  .ctrl-btn:hover svg { fill: #fff; }

  .play-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--teal), var(--teal-light));
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(42, 123, 107, 0.3);
    transition: all 0.2s;
  }
  .play-btn:hover {
    box-shadow: 0 4px 25px rgba(42, 123, 107, 0.5);
    transform: scale(1.05);
  }
  .play-btn svg { fill: #fff !important; }

  /* ====== Visualizer dots ====== */
  .visualizer {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.8s;
  }
  .visualizer.active { opacity: 1; }

  /* ====== Scrollbar for desktop ====== */
  @media (min-width: 481px) {
    .main-container { padding: 0; }
  }

  /* ====== Responsive ====== */
  @media (max-height: 700px) {
    .album-header { padding: 32px 24px 14px; }
    .album-title-zh { font-size: 40px; }
    .track-item { padding: 10px 14px; }
    .player-bar { padding: 10px 16px 24px; }
  }

  /* ====== Page load animation ====== */
  .album-header, .track-item {
    opacity: 0;
    transform: translateY(12px);
    animation: fade-in 0.6s ease forwards;
  }
  .album-header { animation-delay: 0.2s; }
  .track-item:nth-child(1) { animation-delay: 0.35s; }
  .track-item:nth-child(2) { animation-delay: 0.4s; }
  .track-item:nth-child(3) { animation-delay: 0.45s; }
  .track-item:nth-child(4) { animation-delay: 0.5s; }
  .track-item:nth-child(5) { animation-delay: 0.55s; }
  .track-item:nth-child(6) { animation-delay: 0.6s; }
  .track-item:nth-child(7) { animation-delay: 0.65s; }
  .track-item:nth-child(8) { animation-delay: 0.7s; }

  @keyframes fade-in {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ====== Glow accent ====== */
  .glow-orb {
    position: fixed;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 1;
    transition: opacity 2s;
  }
  .glow-orb.teal {
    background: var(--teal-light);
    top: -100px;
    right: -80px;
  }
  .glow-orb.purple {
    background: var(--purple);
    bottom: 100px;
    left: -120px;
  }
  .glow-orb.orange {
    background: var(--orange);
    bottom: -80px;
    right: -60px;
    opacity: 0.06;
  }

  /* ====== Divider ====== */
  .section-divider {
    height: 1px;
    margin: 6px 28px 10px;
    background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
  }
</style>
</head>
<body>

<!-- Background layers -->
<div class="bg-layer" id="bgLayer"></div>
<div class="bg-overlay"></div>
<div class="noise"></div>

<!-- Glow accents -->
<div class="glow-orb teal"></div>
<div class="glow-orb purple"></div>
<div class="glow-orb orange"></div>

<!-- Particles -->
<div class="particles" id="particles"></div>

<!-- Main content -->
<div class="main-container">
  <!-- Album header -->
  <div class="album-header">
    <div class="album-badge">Graduation 2026</div>
    <div class="album-title-zh">存 档</div>
    <div class="album-title-en">A R C H I V E</div>
    <div class="album-meta">
      8 Tracks <span>·</span> 33:53 <span>·</span> Demo Recordings
    </div>
  </div>

  <div class="section-divider"></div>

  <!-- Tracklist -->
  <div class="tracklist-container" id="tracklist">
    <!-- Tracks will be injected by JS -->
  </div>
</div>

<!-- Player bar -->
<div class="player-bar" id="playerBar">
  <div class="progress-container" id="progressBar">
    <div class="progress-fill" id="progressFill">
      <div class="progress-thumb"></div>
    </div>
  </div>
  <div class="player-info">
    <div class="player-track-info">
      <div class="player-track-title" id="playerTitle">选择一首歌</div>
      <div class="player-track-time" id="playerTime">0:00 / 0:00</div>
    </div>
    <div class="player-controls">
      <!-- Prev -->
      <button class="ctrl-btn" id="prevBtn" aria-label="上一首">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <!-- Play/Pause -->
      <button class="play-btn" id="playBtn" aria-label="播放">
        <svg width="22" height="22" viewBox="0 0 24 24" id="playIcon"><polygon points="9,6 19,12 9,18"/></svg>
        <svg width="22" height="22" viewBox="0 0 24 24" id="pauseIcon" style="display:none"><rect x="7" y="6" width="3" height="12"/><rect x="14" y="6" width="3" height="12"/></svg>
      </button>
      <!-- Next -->
      <button class="ctrl-btn" id="nextBtn" aria-label="下一首">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M16 6h2v12h-2zm-10 6l8.5 6V6z" transform="scale(-1,1) translate(-24,0)"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Audio element -->
<audio id="audio" preload="metadata"></audio>

<script>
const tracks = [
  { num: 1, title: '凤凰花开的路口', duration: '4:11', url: 'https://www.coze.cn/s/OrDP2fFMgW4/' },
  { num: 2, title: '成都', duration: '5:28', url: 'https://www.coze.cn/s/VKySwRVis1Q/' },
  { num: 3, title: '好久不见', duration: '4:05', url: 'https://www.coze.cn/s/TXnztSn2TAA/' },
  { num: 4, title: '花香', duration: '4:26', url: 'https://www.coze.cn/s/HxIzA_FIgX0/' },
  { num: 5, title: '裹着心的光', duration: '2:50', url: 'https://www.coze.cn/s/NXmn4ervxTI/' },
  { num: 6, title: '夜空中最亮的星', duration: '4:12', url: 'https://www.coze.cn/s/JPv1gGV8Tk0/' },
  { num: 7, title: '晚风', duration: '3:31', url: 'https://www.coze.cn/s/NYE7YeFQegQ/' },
  { num: 8, title: '这世界那么多人', duration: '5:00', url: 'https://www.coze.cn/s/U2vqFzfmwdI/' },
];

const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const pauseIcon = document.getElementById('pauseIcon');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const playerTitle = document.getElementById('playerTitle');
const playerTime = document.getElementById('playerTime');
const progressFill = document.getElementById('progressFill');
const progressBar = document.getElementById('progressBar');
const tracklist = document.getElementById('tracklist');
const bgLayer = document.getElementById('bgLayer');

let currentTrack = -1;
let isPlaying = false;

// Render tracklist
function renderTracks() {
  tracklist.innerHTML = tracks.map((t, i) => `
    <div class="track-item${i === currentTrack ? ' active' : ''}${!isPlaying && i === currentTrack ? ' paused' : ''}" data-index="${i}" onclick="playTrack(${i})">
      <div class="track-num">${String(t.num).padStart(2, '0')}</div>
      <div class="track-info">
        <div class="track-title">${t.title}</div>
        <div class="track-subtitle">Demo Recording</div>
      </div>
      <div class="track-duration">${t.duration}</div>
      <div class="track-playing-icon${!isPlaying && i === currentTrack ? ' paused' : ''}">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>
  `).join('');
}
renderTracks();

function playTrack(index) {
  if (index === currentTrack && isPlaying) {
    audio.pause();
    return;
  }
  currentTrack = index;
  audio.src = tracks[index].url;
  audio.play().catch(() => {});
  isPlaying = true;
  updateUI();
}

function updateUI() {
  playIcon.style.display = isPlaying ? 'none' : 'block';
  pauseIcon.style.display = isPlaying ? 'block' : 'none';
  if (currentTrack >= 0) {
    playerTitle.textContent = tracks[currentTrack].title;
  }
  bgLayer.classList.toggle('playing', isPlaying);
  renderTracks();
}

playBtn.addEventListener('click', () => {
  if (currentTrack < 0) {
    playTrack(0);
    return;
  }
  if (isPlaying) {
    audio.pause();
  } else {
    audio.play().catch(() => {});
  }
});

prevBtn.addEventListener('click', () => {
  if (currentTrack > 0) playTrack(currentTrack - 1);
  else playTrack(tracks.length - 1);
});

nextBtn.addEventListener('click', () => {
  if (currentTrack < tracks.length - 1) playTrack(currentTrack + 1);
  else playTrack(0);
});

audio.addEventListener('play', () => { isPlaying = true; updateUI(); });
audio.addEventListener('pause', () => { isPlaying = false; updateUI(); });
audio.addEventListener('ended', () => {
  if (currentTrack < tracks.length - 1) playTrack(currentTrack + 1);
  else { isPlaying = false; updateUI(); }
});

audio.addEventListener('timeupdate', () => {
  if (audio.duration) {
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + '%';
    playerTime.textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
  }
});

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

// Progress bar click
progressBar.addEventListener('click', (e) => {
  if (!audio.duration) return;
  const rect = progressBar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

// Particles
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.width = (1 + Math.random() * 2) + 'px';
    p.style.height = p.style.width;
    container.appendChild(p);
  }
}
createParticles();
</script>
</body>
</html>
